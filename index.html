<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>张雨桐 · Developer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap">
<style>
:root {
  --bg: #1a1817;
  --text: #e8dcc8;
  --dim: #8b8070;
  --accent: #d4a853;
  --green: #7d9b6e;
  --red: #c4746e;
  --blue: #7d9bb9;
  --prompt: #a09070;
}
* { margin:0; padding:0; box-sizing:border-box }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
  font-size: 14px;
  line-height: 1.75;
  min-height: 100dvh;
  overflow-x: hidden;
}
#terminal {
  max-width: 820px;
  margin: 0 auto;
  padding: 32px 24px;
  min-height: 100dvh;
}
#output { white-space: pre-wrap; word-break: break-all }
#output .line { min-height: 1.75em }
#output .dim { color: var(--dim) }
#output .accent { color: var(--accent) }
#output .green { color: var(--green) }
#output .red { color: var(--red) }
#output .blue { color: var(--blue) }
#output .bold { font-weight: 700 }
#output .link { color: var(--blue); text-decoration: underline; cursor: pointer }
#output .link:hover { color: var(--accent) }
#output hr { border: none; border-top: 1px solid rgba(232,220,200,0.08); margin: 20px 0 }

#input-line {
  display: flex;
  align-items: center;
  margin-top: 4px;
}
#prompt-text {
  color: var(--prompt);
  white-space: pre;
  user-select: none;
  flex-shrink: 0;
}
#cmd-input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font: inherit;
  font-size: inherit;
  outline: none;
  caret-color: var(--accent);
  padding: 0;
  margin: 0;
}
#cmd-input::placeholder { color: var(--dim) }

/* QR Modal */
.modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.8);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; visibility: hidden;
  transition: opacity 0.3s, visibility 0.3s;
}
.modal-overlay.active { opacity: 1; visibility: visible }
.modal-card {
  background: #242220; border: 1px solid rgba(232,220,200,0.12);
  padding: 40px 36px 32px; text-align: center;
  max-width: 340px; width: 90%;
  font-family: 'JetBrains Mono', monospace;
}
.modal-close {
  position: absolute; top: 10px; right: 14px;
  background: none; border: none; color: var(--dim);
  font-size: 20px; cursor: pointer; font-family: inherit;
}
.modal-close:hover { color: var(--text) }
.modal-card h3 { font-size: 16px; margin-bottom: 6px; color: var(--accent); font-weight: 500 }
.modal-card p { font-size: 12px; color: var(--dim); margin-bottom: 24px }
.qr-wrapper { display: inline-block; padding: 12px; background: #fff; margin-bottom: 16px }
.qr-wrapper img { display: block; width: 160px; height: 160px }
.modal-tip { font-size: 11px; color: var(--dim) }

/* mobile */
@media(max-width:600px) {
  #terminal { padding: 20px 16px; font-size: 12px }
}
</style>
</head>
<body>

<div id="terminal">
  <div id="output"></div>
  <div id="input-line">
    <span id="prompt-text"></span>
    <input id="cmd-input" type="text" autofocus autocomplete="off" autocapitalize="off" spellcheck="false">
  </div>
</div>

<!-- QR Modal -->
<div class="modal-overlay" id="qrModal">
  <div class="modal-card" style="position:relative">
    <button class="modal-close" id="modalClose">&times;</button>
    <h3>scan --wechat</h3>
    <p>备注来意，看到就回</p>
    <div class="qr-wrapper">
      <img src="wechat-qr.png" alt="微信二维码" id="qrImage">
    </div>
    <p class="modal-tip">截图后用微信扫码</p>
  </div>
</div>

<script>
const out = document.getElementById('output');
const inp = document.getElementById('cmd-input');
const promptEl = document.getElementById('prompt-text');
const term = document.getElementById('terminal');

let history = [];
let historyIdx = -1;
let tempInput = '';

const promptStr = 'guest@zhangyutong ~ ';

function setPrompt() {
  promptEl.textContent = promptStr + '$ ';
}

function write(html) {
  const div = document.createElement('div');
  div.className = 'line';
  div.innerHTML = html;
  out.appendChild(div);
}

function writeln(text) { write(escapeHtml(text)); }

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollDown() {
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

// Welcome
function showWelcome() {
  write('<span class="dim">┌──────────────────────────────────────────┐</span>');
  write('<span class="dim">│</span>  <span class="bold">zhangyutong.dev</span>                          <span class="dim">│</span>');
  write('<span class="dim">│</span>  <span class="dim">大一 · 网络工程 · 全栈开发</span>              <span class="dim">│</span>');
  write('<span class="dim">│</span>  输入 <span class="accent">help</span> 查看可用命令                    <span class="dim">│</span>');
  write('<span class="dim">└──────────────────────────────────────────┘</span>');
  write('');
}

// Commands
const cmds = {
  help() {
    write('<span class="bold accent">可用命令</span>');
    write('');
    write('  <span class="accent">ls</span>        列出所有项目');
    write('  <span class="accent">cat todo</span>   查看 Todo 智能待办');
    write('  <span class="accent">cat ai</span>     查看 AI 拆解大师');
    write('  <span class="accent">cat drink</span>  查看饮品点单系统');
    write('  <span class="accent">whoami</span>    关于我');
    write('  <span class="accent">contact</span>   联系我');
    write('  <span class="accent">clear</span>     清屏');
    write('  <span class="accent">open &lt;n&gt;</span>   打开项目 (1/2/3)');
    write('');
  },

  ls() {
    write('<span class="dim">total 3</span>');
    write('<span class="accent">drwxr-xr-x</span>  <span class="bold">todo/</span>      <span class="dim">智能待办清单 · PWA</span>');
    write('<span class="accent">drwxr-xr-x</span>  <span class="bold">ai/</span>        <span class="dim">AI 拆解大师 · Claude API</span>');
    write('<span class="accent">drwxr-xr-x</span>  <span class="bold">drink/</span>     <span class="dim">饮品点单系统 · 小程序</span>');
    write('');
    write('<span class="dim"># 输入 cat &lt;项目名&gt; 查看详情</span>');
  },

  'cat todo'() {
    write('<span class="bold accent">✧ 智能待办清单</span>');
    write('');
    write('<span class="dim">问题：</span>市面待办软件要么太复杂（Notion 级学习成本），要么太简陋（只能打勾）。');
    write('      需要一个"刚好够用但又好看"的。');
    write('');
    write('<span class="dim">做了什么：</span>');
    write('  · 五套主题配色（Cashmere/Noir/Sage/Mauve/Sepia）');
    write('  · 内嵌番茄钟，不跳转页面');
    write('  · 子任务无限拆解 + 拖拽排序');
    write('  · PWA 离线可用，装手机像原生 App');
    write('  · IndexedDB 本地存储，不丢数据');
    write('  · JSON 导入导出，不锁数据');
    write('');
    write('<span class="dim">技术：</span>PWA · Service Worker · IndexedDB · Vanilla JS · 零依赖');
    write('');
    write('→ 输入 <span class="accent">open 1</span> 打开项目');
  },

  'cat ai'() {
    write('<span class="bold accent">✧ AI 拆解大师</span>');
    write('');
    write('<span class="dim">问题：</span>很多人有大目标（考研、学吉他、写小说），但不知道第一步做什么。');
    write('      拖延不是因为懒，是因为目标太模糊。');
    write('');
    write('<span class="dim">做了什么：</span>');
    write('  · AI 把大目标递归拆成 1-5 分钟的微行动');
    write('  · 十套预设目标：考研上岸(42步)、学吉他(33步)、减重(28步)…');
    write('  · 支持 Claude API 实时拆解任意目标');
    write('  · 完成即勾，不用思考"接下来干什么"');
    write('');
    write('<span class="dim">技术：</span>Claude API · PWA · 递归拆解算法 · 离线缓存');
    write('');
    write('→ 输入 <span class="accent">open 2</span> 打开项目');
  },

  'cat drink'() {
    write('<span class="bold accent">✧ 饮品点单系统</span>');
    write('');
    write('<span class="dim">问题：</span>小奶茶店高峰期排队乱、手写单看不清、漏单错单。');
    write('      老板想数字化但外面方案太贵。');
    write('');
    write('<span class="dim">做了什么：</span>');
    write('  · 客人扫码 → 选饮品下单 → 一气呵成');
    write('  · 商家后台 WebSocket 实时推送新订单，声音提醒');
    write('  · 商品管理：上架下架改价格，商家自主操作');
    write('  · 微信小程序端 + 商家后台 + 数据管理，完整闭环');
    write('');
    write('<span class="dim">技术：</span>微信小程序 · Node.js · WebSocket · 商家鉴权');
    write('');
    write('→ 输入 <span class="accent">open 3</span> 打开项目');
  },

  'cat microsteps'() { cmds['cat ai'](); },

  whoami() {
    write('<span class="dim">name:</span>      张雨桐');
    write('<span class="dim">role:</span>      学生 · 全栈开发者');
    write('<span class="dim">school:</span>    大一 · 网络工程');
    write('<span class="dim">stack:</span>     前端(React/Vue/Vanilla) · 后端(Node.js) · 小程序');
    write('<span class="dim">deploy:</span>    GitHub Pages · Netlify · 自有服务器');
    write('<span class="dim">motto:</span>     <span class="green">写代码的人，不只是写代码。</span>');
    write('');
    write('<span class="dim"># 输入 ls 看我做了什么</span>');
  },

  contact() {
    document.getElementById('qrModal').classList.add('active');
    document.body.style.overflow = 'hidden';
    write('<span class="green">已弹出微信二维码 →</span>');
  },

  clear() { out.innerHTML = ''; },
};

const links = {
  '1': 'https://jm666-qwe.github.io/todo/',
  '2': 'https://jm666-qwe.github.io/microsteps/',
  '3': 'https://jm666-qwe.github.io/drink-order/',
};

function execute(raw) {
  const cmd = raw.trim();
  if (!cmd) return;

  // Echo command
  write('<span class="dim">' + promptStr + '$</span> ' + escapeHtml(cmd));

  if (cmd === 'clear' || cmd === 'cls') {
    cmds.clear();
    history.push(cmd);
    return;
  }

  if (cmd.startsWith('open ')) {
    const n = cmd.split(' ')[1];
    if (links[n]) {
      write('<span class="green">→ 正在打开项目 ' + n + '...</span>');
      window.open(links[n], '_blank');
    } else {
      write('<span class="red">错误：未知项目编号。请用 open 1、open 2 或 open 3</span>');
    }
    history.push(cmd);
    return;
  }

  if (cmds[cmd]) {
    cmds[cmd]();
  } else if (cmds['cat ' + cmd]) {
    cmds['cat ' + cmd]();
  } else {
    write('<span class="red">命令未找到：</span>' + escapeHtml(cmd));
    write('<span class="dim">输入 help 查看可用命令。提示：试试 ls、whoami、cat todo</span>');
  }

  history.push(cmd);
}

// Input handling
inp.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const cmd = inp.value;
    inp.value = '';
    execute(cmd);
    historyIdx = history.length;
    scrollDown();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIdx === history.length) tempInput = inp.value;
    if (historyIdx > 0) {
      historyIdx--;
      inp.value = history[historyIdx];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIdx < history.length - 1) {
      historyIdx++;
      inp.value = history[historyIdx];
    } else if (historyIdx === history.length - 1) {
      historyIdx++;
      inp.value = tempInput;
    }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    const val = inp.value.trim();
    const allCmds = ['help','ls','whoami','contact','clear','cat todo','cat ai','cat drink','open 1','open 2','open 3'];
    const match = allCmds.find(c => c.startsWith(val));
    if (match) inp.value = match + ' ';
  }
});

// Click terminal to focus
term.addEventListener('click', () => inp.focus());

// QR modal
document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('qrModal').classList.remove('active');
  document.body.style.overflow = '';
});
document.getElementById('qrModal').addEventListener('click', function(e) {
  if (e.target === this) {
    this.classList.remove('active');
    document.body.style.overflow = '';
  }
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.getElementById('qrModal').classList.remove('active');
    document.body.style.overflow = '';
  }
});

// QR fallback
document.getElementById('qrImage').onerror = function() {
  document.querySelector('.qr-wrapper').innerHTML = '<div style="width:160px;height:160px;background:#333;display:flex;align-items:center;justify-content:center;font-size:12px;color:#888;text-align:center;padding:12px">将 wechat-qr.png<br>放在同目录下</div>';
};

// Init
setPrompt();
showWelcome();
inp.focus();

// Handle Ctrl+L
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'l') {
    e.preventDefault();
    cmds.clear();
  }
});
</script>
</body>
</html>
